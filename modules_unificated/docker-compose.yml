services:
  sharkhub-modules-unificated:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://pandabarbershop.com}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    image: sharkhub-modules-unificated:latest
    container_name: sharkhub_modules_unificated_web
    restart: unless-stopped
    ports:
      - "80:80"
